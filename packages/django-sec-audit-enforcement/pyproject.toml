[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "django-sec-audit-enforcement"
version = "0.1.0a2"
description = "Redis + Postgres enforcement layer for django-sec-audit: temp/permanent blocks, ingress check, OTel enforcement events"
readme = "README.md"
license = "MIT"
authors = [{ name = "Ammar", email = "ammarwaleed@proton.me" }]
requires-python = ">=3.10"
keywords = ["django", "security", "audit", "enforcement", "rate-limit", "redis", "siem"]
dependencies = [
  "sec-audit-rules[redis]>=0.1.0a2,<0.2",
  "django-sec-audit>=0.1.0a4,<0.2",
  "django>=5.2,<6.1",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Framework :: Django",
  "Topic :: Security",
]

[project.urls]
Homepage = "https://github.com/ammar39/sec-audit"
Repository = "https://github.com/ammar39/sec-audit"
Documentation = "https://github.com/ammar39/sec-audit/tree/main/packages/django-sec-audit-enforcement"
Changelog = "https://github.com/ammar39/sec-audit/blob/main/CHANGELOG.md"
Issues = "https://github.com/ammar39/sec-audit/issues"

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-django>=4.12.0", "ruff>=0.8", "fakeredis[lua]>=2.21"]

[tool.hatch.build.targets.wheel]
packages = ["src/sec_audit"]
only-include = ["src/sec_audit/django_enforcement"]

[tool.hatch.build.targets.wheel.sources]
"src/sec_audit" = "sec_audit"

[tool.hatch.build]
# Admin templates ship as package data (the "Block manager" view renders them).
artifacts = [
  "src/sec_audit/django_enforcement/templates/**/*.html",
]

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.format]
quote-style = "single"

[tool.pytest.ini_options]
pythonpath = ["src", "."]
DJANGO_SETTINGS_MODULE = "tests.settings"
